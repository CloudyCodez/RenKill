name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller==6.19.0 psutil

      - name: Verify source compiles
        shell: pwsh
        run: |
          python -m py_compile .\renkill.py
          python -m py_compile .\renengine_hunter.py

      - name: Build RenKill.exe
        shell: pwsh
        run: |
          python -m PyInstaller `
            --onefile `
            --windowed `
            --name "RenKill" `
            --hidden-import psutil `
            --hidden-import winreg `
            --hidden-import tkinter `
            --hidden-import tkinter.scrolledtext `
            --hidden-import tkinter.messagebox `
            --hidden-import tkinter.filedialog `
            --collect-all psutil `
            --noupx `
            .\renkill.py

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash .\dist\RenKill.exe -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path .\dist\RenKill.sha256.txt -Value "$hash *RenKill.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenKill-${{ github.ref_name }}
          path: |
            dist/RenKill.exe
            dist/RenKill.sha256.txt
          if-no-files-found: error

      - name: Attach assets to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/RenKill.exe
            dist/RenKill.sha256.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
